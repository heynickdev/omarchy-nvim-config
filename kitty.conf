##########################################################################

# themes
# include GruvBox_DarkHard.conf
#include Wryan.conf
#include VSCode_Dark.conf

# terminal opacity and blur
background_opacity 1.0
background_blur 1

# advance 
term xterm-kitty

# terminal bell
enable_audio_bell no

# font
# font_family        SauceCodePro Nerd Font
bold_font          auto
italic_font        auto
bold_italic_font   auto
font_size 9.0

# font size management 
map ctrl+shift+backspace change_font_size all 0

# cursor customization
# block / beam / underline
cursor_shape block
cursor_blink_interval 0
cursor_stop_blinking_after 0
shell_integration no-cursor


# mouse
mouse_hide_wait -1


# window management 
map ctrl+shift+enter new_window
map ctrl+shift+] next_window
map ctrl+shift+[ previous_window
map ctrl+shift+w close_window


# layout management
# map ctrl+shift+l next_layout
# map ctrl+alt+r goto_layout tall
# map ctrl+alt+s goto_layout stack

# tab bar customization
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_edge top
tab_bar_align left
active_tab_font_style   bold
inactive_tab_font_style normal


# tab management
map ctrl+shift+t new_tab
map ctrl+shift+l next_tab
map ctrl+shift+h previous_tab
map ctrl+shift+q close_tab



#----------------------------- github custom ------------------------------------


font_size 9.0
copy_on_select yes

enable_audio_bell no
visual_bell_duration 0
window_alert_on_bell yes
bell_on_tab yes

tab_bar_edge bottom
tab_bar_margin_width 1.0
#tab_bar_margin_height 5 0
tab_bar_style separator
tab_bar_min_tabs 2
#tab_separator " | "
tab_separator ""
tab_activity_symbol *
tab_title_template        "{fmt.fg._5c6370}{fmt.bg.default}{fmt.fg._abb2bf}{fmt.bg._5c6370} {fmt.fg.red}{activity_symbol}{fmt.fg._abb2bf}{index}: {title}{' [{}]'.format(num_windows) if num_windows > 1 else ''} {fmt.fg._5c6370}{fmt.bg.default} "
active_tab_title_template "{fmt.fg._282c34}{fmt.bg.default}{fmt.fg._abb2bf}{fmt.bg._282c34} {fmt.fg.red}{activity_symbol}{fmt.fg._abb2bf}{index}: {title}{' [{}]'.format(num_windows) if num_windows > 1 else ''} {fmt.fg._282c34}{fmt.bg.default} "
background_opacity 0.90

active_tab_font_style   bold
inactive_tab_font_style normal



kitty_mod ctrl+shift
map ctrl+t launch --cwd=current --type window
map kitty_mod+f launch --type=overlay --stdin-source=@screen_scrollback /bin/sh -c "/usr/bin/fzf --no-sort --no-mouse --exact -i --tac | kitty +kitten clipboard"
map ctrl+shift+t launch --type=tab --cwd=current
map ctrl+tab select_tab
map ctrl+left resize_window narrower
map ctrl+right resize_window wider
map ctrl+up resize_window taller
map ctrl+down resize_window shorter 3
# reset all windows in the tab to default sizes
map ctrl+home resize_window reset

map kitty_mod+c copy_to_clipboard

map ctrl+shift+f5 load_config_file

#: There is also a copy_or_interrupt action that can be optionally
#: mapped to Ctrl+c. It will copy only if there is a selection and
#: send an interrupt otherwise.

map cmd+c        copy_or_interrupt
map kitty_mod+v  paste_from_clipboard
map cmd+v        paste_from_clipboard

map kitty_mod+s  paste_from_selection
map shift+insert paste_from_selection

map kitty_mod+equal     change_font_size all +2.0
map kitty_mod+minus     change_font_size all -2.0
map kitty_mod+backspace change_font_size all 0

map kitty_mod+]     next_window
map kitty_mod+[     previous_window
map kitty_mod+w     close_window

map page_up scroll_page_up
map page_down scroll_page_down
map kitty_mod+home scroll_home
map kitty_mod+end scroll_end

map alt+shift+1 goto_tab 1
map alt+shift+2 goto_tab 2
map alt+shift+3 goto_tab 3
map alt+shift+4 goto_tab 4
map alt+shift+5 goto_tab 5 
map alt+shift+6 goto_tab 6
map alt+shift+7 goto_tab 7
map alt+shift+8 goto_tab 8
map alt+shift+9 goto_tab 9
map alt+shift+0 goto_tab 10

#map ctrl+t set_title

detect_urls yes
# url_color #7B8887
url_style curly
url_prefixes http https file ftp gemini irc gopher mailto news git
confirm_os_window_close 0

term xterm-256color
#draw_minimal_borders yes
# active_border_color #4c7899

allow_remote_control yes
listen_on unix:/tmp/kitty

paste_actions quote-urls-at-prompt,confirm-if-large
shell_integration enabled
map ctrl+shift+g show_last_command_output

map ctrl+shift+z scroll_to_prompt -1
map ctrl+shift+x scroll_to_prompt 1
map kitty_mod+p kitten hints --type=regex --regex="(?<path>(?:\/[\w-_^ ]+)+\/?(?:[\w.])+[^.]):\[(?<line>\d+),\d+\].?" --program "launch /home/madhur/scripts/editor.py"

# BEGIN_KITTY_FONTS
font_family      family="JetBrainsMono Nerd Font Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS



include hyde.conf

# Minimal Tab bar styling 
tab_bar_edge                bottom
tab_bar_style               powerline
tab_powerline_style         slanted
tab_title_template          {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}

# remap to open new kitty tab in the same directory (default is home dir)
# map ctrl+shift+t            new_tab_with_cwd

# Uncomment the following 4 lines to minimize kitty latency (higher energy usage)
# input_delay 0
# repaint_delay 2
# sync_to_monitor no
# wayland_enable_ime no

# Allow remote control (needed for the plugin to communicate with Kitty)
allow_remote_control yes
listen_on unix:/tmp/mykitty
shell_integration enabled

# Define the scrollback pager kitten
# Ensure this path matches your plugin installation directory
action_alias kitty_scrollback_nvim kitten ~/.local/share/nvim/lazy/kitty-scrollback.nvim/python/kitty_scrollback_nvim.py

# Map Ctrl+Shift+H to open the full scrollback in Neovim
map ctrl+shift+h kitty_scrollback_nvim

# Map Ctrl+Shift+G to open the LAST command output in Neovim
# Note: This requires shell_integration to be enabled and working in your shell
map ctrl+shift+g kitty_scrollback_nvim --config-file last_cmd_output.lua

