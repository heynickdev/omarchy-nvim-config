# в–Ҳв–‘в–ҲвҖғв–Ҳв–ҖвҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–Җв–ҲвҖғ вҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–Җ
# в–Ҳв–„в–ҲвҖғв–„в–ҲвҖғв–Ҳв–Ҳв–„вҖғв–Ҳв–Җв–„вҖғ вҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–Җв–„вҖғв–Ҳв–Ҳв–„вҖғв–Ҳв–Җв–‘вҖғв–„в–Ҳ

# Set your personal hyprland configuration here
# See https://wiki.hyprland.org/Configuring for more information

# // в–ҲвҖғв–Ҳв–„в–‘в–ҲвҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–‘в–ҲвҖғв–Җв–Ҳв–Җ
# // в–ҲвҖғв–Ҳв–‘в–Җв–ҲвҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–„в–ҲвҖғв–‘в–Ҳв–‘


#  Uncomment to enable // change to a preferred value
# рҹ”— See https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = custom_numpad
    kb_variant = myswap
    # follow_mouse = 1
    # sensitivity = 0
    # force_no_accel = 0
    # accel_profile = flat 
    # numlock_by_default = true

    # рҹ”— See https://wiki.hyprland.org/Configuring/Variables/#touchpad
    touchpad {
        natural_scroll = no
    }

}
# рҹ”— See https://wiki .hyprland.org/Configuring/Variables/#gestures
gestures {
#     workspace_swipe = true
#     workspace_swipe_fingers = 3
}

# for window shallow similar to devour
misc {
    # enable_swallow = true
    # swallow_regex = (foot|kitty|allacritty|Alacritty|ghostty|Ghostty|org.wezfurlong.wezterm)
}

# Don't show update on first launch
ecosystem {
  # no_update_news = true
}

# monitor = ,preferred,auto,auto
monitor = , preferred, auto, 1

# ---- keybinds ---------
# ---- variables --------
$TERMINAL = kitty
$BROWSER = flatpak run app.zen_browser.zen

# ---- Unbinds ----------
unbind = $mainMod Alt, T
unbind = $mainMod, Q
unbind = $mainMod, T
unbind = $mainMod, L
unbind = $mainMod, W
unbind = $mainMod, B
unbind = $mainMod, G
unbind = $mainMod, E

# Focus
unbind = $mainMod, Left
unbind = $mainMod, Right
unbind = $mainMod, Up
unbind = $mainMod, Down
unbind = $mainMod, J
unbind = $mainMod, K
unbind = $mainMod, C
# Move
unbind = $mainMod Shift Control, Left
unbind = $mainMod Shift Control, Right
unbind = $mainMod Shift Control, Up 
unbind = $mainMod Shift Control, Down
# Rofi
unbind = $mainMod, A
unbdin = , Caps_Lock


# 1. Window Management
$wm=Window Management
$d=[$wm]
bindd = $mainMod, W, $d close focused window, exec, hyde-shell dontkillsteam
bindd = $mainMod, F, $d Toggle floating, togglefloating
bindd = $mainMod, Escape, $d lock screen, exec, hyde-shell lock-session
bindd = $mainMod Control, J, $d toggle split, layoutmsg, togglesplit

# 2. Focus & Split
$d=[$wm|Change Focus]
bindd = $mainMod, H, $d focus left, movefocus, l
bindd = $mainMod, L, $d focus right, movefocus, r
bindd = $mainMod, K, $d focus up, movefocus, u
bindd = $mainMod, J, $d focus down, movefocus, d
$d=[$wm|Move Window]
bindde = $mainMod Shift, H, Move active window to the left, exec, $moveactivewindow -30 0 || hyprctl dispatch movewindow l
bindde = $mainMod Shift, L, Move active window to the right, exec, $moveactivewindow 30 0 || hyprctl dispatch movewindow r
bindde = $mainMod Shift, K, Move active window up, exec, $moveactivewindow  0 -30 || hyprctl dispatch movewindow u
bindde = $mainMod Shift, J, Move active window down, exec, $moveactivewindow 0 30 || hyprctl dispatch movewindow d

$d=[$wm|Rofi Menus]
bindd = $mainMod, space, $d application finder , exec, pkill -x rofi || $rofi-launch d
bindd = $mainMod, O, $d waybar theme, exec, hyde-shell waybar --select

# 3. Application Launchers
$d=[Launcher|Apps]
bind = $mainMod, Return, exec, $TERMINAL
bindd = $mainMod, T, $d Launch btop, exec, $TERMINAL --class btop_float -e btop
bind = $mainMod, B, exec, $BROWSER
bindd = $mainMod, C, $d gemini, exec, $BROWSER --new-window https://gemini.google.com
bindd = $mainMod Shift, C, $d copilot, exec, $BROWSER --new-window https://copilot.microsoft.com/
bindd = $mainMod, Y, $d browser, exec, $BROWSER --new-window https://youtube.com
bindd = $mainMod, G, $d whatsapp, exec, zapzap
bindd = $mainMod, D, $d discord, exec, discord 
bindd = $mainMod, E, $d Yazi, exec, $terminal fish -ic "y; exec fish"
bindd = $mainMod Control, S, $d spotify, exec, spotify


$d=#!

input {
  # kb_options = caps:swapescape
}


general {
    gaps_in = 0 
    gaps_out = 0
    border_size = 1
    col.active_border = rgba(d9d9d9ff) rgba(a6a6a6ff) 45deg
    col.inactive_border = rgba(404040cc) rgba(262626cc) 45deg
    layout = dwindle
    resize_on_border = true
}

group {
    col.border_active = rgba(d9d9d9ff) rgba(a6a6a6ff) 45deg
    col.border_inactive = rgba(404040cc) rgba(262626cc) 45deg
    col.border_locked_active = rgba(d9d9d9ff) rgba(a6a6a6ff) 45deg
    col.border_locked_inactive = rgba(404040cc) rgba(262626cc) 45deg
}

decoration {
    rounding = 0

    shadow {
        enabled = no
        offset = 0 0
        range = 0
        render_power = 4
        ignore_window = yes
        color = 0xffFFFFFF
    }
    blur {
        enabled = yes
        size = 6
        passes = 3
        new_optimizations = on
        ignore_opacity = on
        xray = true
    }
    active_opacity = 1.0
    inactive_opacity = 1.0
    fullscreen_opacity = 1.0
}


# Window rules
windowrule {
    name = btop_window
    match:class = ^(btop_float)$
    float = 1
    size = 1000 650
    center = 1
    opacity = 0.85 0.85 1
}

windowrule {
  name = kitty
  match:class = ^(kitty)$
  opacity = 0.8 0.8 1
}

windowrule {
  name = ghostty
  match:class = ^(ghostty)$
  opacity = 0.8 0.8 1
}

